name: Build and Release Package

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build (example: 0.1.69)"
        required: false
        type: string

concurrency:
  group: build-release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build-tgz:
    name: Build tgz package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22.x"
          registry-url: "https://registry.npmjs.org"

      - name: Cache node_modules
        uses: actions/cache@v5
        with:
          path: |
            node_modules
            web-ui/node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-

      - name: Install dependencies
        run: npm ci || npm install

      - name: Install web-ui dependencies
        run: cd web-ui && (npm ci || npm install)

      - name: Build package
        run: npm run build
        env:
          POSTHOG_KEY: ${{ secrets.POSTHOG_KEY }}
          POSTHOG_HOST: ${{ secrets.POSTHOG_HOST }}
          OTEL_TELEMETRY_ENABLED: ${{ secrets.OTEL_TELEMETRY_ENABLED }}
          OTEL_LOGS_EXPORTER: otlp
          OTEL_METRICS_EXPORTER: otlp
          OTEL_EXPORTER_OTLP_PROTOCOL: ${{ secrets.OTEL_EXPORTER_OTLP_PROTOCOL }}
          OTEL_EXPORTER_OTLP_ENDPOINT: ${{ secrets.OTEL_EXPORTER_OTLP_ENDPOINT }}
          OTEL_EXPORTER_OTLP_HEADERS: ${{ secrets.OTEL_EXPORTER_OTLP_HEADERS }}

      - name: Pack tgz
        run: npm pack

      - name: List generated package
        run: ls -lh kanban-*.tgz

      - name: Upload tgz artifact
        uses: actions/upload-artifact@v5
        with:
          name: kanban-package
          path: kanban-*.tgz
          retention-days: 30

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name || format('v{0}', inputs.version) }}
          name: ${{ github.ref_name || format('v{0}', inputs.version) }}
          files: kanban-*.tgz
          prerelease: ${{ contains(github.ref_name || inputs.version, '-') }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
