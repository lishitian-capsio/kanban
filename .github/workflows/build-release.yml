name: Build and Release Package

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build (example: 0.1.69)"
        required: false
        type: string

concurrency:
  group: build-release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build-tgz:
    name: Build tgz package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          registry-url: "https://registry.npmjs.org"

      - name: Cache Bun install cache
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-cache-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-cache-

      - name: Install dependencies
        run: |
          echo "Installing dependencies with retry..."
          for i in 1 2 3; do
            if BUN_INSTALL_REGISTRY=https://registry.npmjs.org bun install --frozen-lockfile; then
              echo "Success on attempt $i"
              exit 0
            fi
            echo "Attempt $i failed, waiting 5s..."
            sleep 5
          done
          echo "Falling back to non-frozen install..."
          bun install

      - name: Install web-ui dependencies
        run: bun install --cwd web-ui --frozen-lockfile || bun install --cwd web-ui

      - name: Install desktop dependencies (if exists)
        run: |
          if [ -d "packages/desktop" ]; then
            bun install --cwd packages/desktop || npm ci --prefix packages/desktop
          fi

      - name: Build package
        run: bun run build
        env:
          POSTHOG_KEY: ${{ secrets.POSTHOG_KEY }}
          POSTHOG_HOST: ${{ secrets.POSTHOG_HOST }}
          OTEL_TELEMETRY_ENABLED: ${{ secrets.OTEL_TELEMETRY_ENABLED }}
          OTEL_LOGS_EXPORTER: otlp
          OTEL_METRICS_EXPORTER: otlp
          OTEL_EXPORTER_OTLP_PROTOCOL: ${{ secrets.OTEL_EXPORTER_OTLP_PROTOCOL }}
          OTEL_EXPORTER_OTLP_ENDPOINT: ${{ secrets.OTEL_EXPORTER_OTLP_ENDPOINT }}
          OTEL_EXPORTER_OTLP_HEADERS: ${{ secrets.OTEL_EXPORTER_OTLP_HEADERS }}

      - name: Pack tgz
        run: bun run npm pack

      - name: List generated package
        run: ls -lh kanban-*.tgz

      - name: Upload tgz artifact
        uses: actions/upload-artifact@v4
        with:
          name: kanban-package
          path: kanban-*.tgz
          retention-days: 30

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name || format('v{0}', inputs.version) }}
          name: ${{ github.ref_name || format('v{0}', inputs.version) }}
          files: kanban-*.tgz
          prerelease: ${{ contains(github.ref_name || inputs.version, '-') }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
