name: Build and Release Package

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build (example: 0.1.69)"
        required: false
        type: string

concurrency:
  group: build-release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build-tgz:
    name: Build tgz package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          registry-url: "https://registry.npmjs.org"
          cache: npm

      - name: Configure npm mirror
        run: |
          # Use npm mirror for better connectivity from GitHub Actions
          npm config set registry https://registry.npmjs.org/
          echo "Using npm registry: $(npm config get registry)"

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            web-ui/node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('**/package-lock.json', '**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-

      - name: Install dependencies
        run: |
          echo "Installing root dependencies..."
          npm ci || npm install
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Install web-ui dependencies
        run: |
          echo "Installing web-ui dependencies..."
          cd web-ui && (npm ci || npm install)
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Install desktop dependencies (if exists)
        run: |
          if [ -d "packages/desktop" ]; then
            echo "Installing desktop dependencies..."
            cd packages/desktop && (npm ci || npm install)
          fi
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Build package
        run: npm run build
        env:
          POSTHOG_KEY: ${{ secrets.POSTHOG_KEY }}
          POSTHOG_HOST: ${{ secrets.POSTHOG_HOST }}
          OTEL_TELEMETRY_ENABLED: ${{ secrets.OTEL_TELEMETRY_ENABLED }}
          OTEL_LOGS_EXPORTER: otlp
          OTEL_METRICS_EXPORTER: otlp
          OTEL_EXPORTER_OTLP_PROTOCOL: ${{ secrets.OTEL_EXPORTER_OTLP_PROTOCOL }}
          OTEL_EXPORTER_OTLP_ENDPOINT: ${{ secrets.OTEL_EXPORTER_OTLP_ENDPOINT }}
          OTEL_EXPORTER_OTLP_HEADERS: ${{ secrets.OTEL_EXPORTER_OTLP_HEADERS }}

      - name: Pack tgz
        run: npm pack

      - name: List generated package
        run: ls -lh kanban-*.tgz

      - name: Upload tgz artifact
        uses: actions/upload-artifact@v4
        with:
          name: kanban-package
          path: kanban-*.tgz
          retention-days: 30

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name || format('v{0}', inputs.version) }}
          name: ${{ github.ref_name || format('v{0}', inputs.version) }}
          files: kanban-*.tgz
          prerelease: ${{ contains(github.ref_name || inputs.version, '-') }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
