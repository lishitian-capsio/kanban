name: Test

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-check-test:
    timeout-minutes: 10
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
          - os: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Setup Node.js (for node-gyp / Electron)
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Cache Bun install cache
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-cache-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-cache-

      # macOS node-gyp/electron rebuilds can fail with Python 3.12/distutils; pin 3.11.
      - name: Setup Python (for node-gyp on macOS)
        if: matrix.os == 'macos-latest'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          echo "Installing dependencies with retry..."
          for i in 1 2 3; do
            if BUN_INSTALL_REGISTRY=https://registry.npmjs.org bun install --frozen-lockfile; then
              echo "Success on attempt $i"
              exit 0
            fi
            echo "Attempt $i failed, waiting 5s..."
            sleep 5
          done
          echo "Falling back to non-frozen install..."
          bun install

      - name: Install web-ui dependencies
        run: |
          echo "Installing web-ui dependencies..."
          bun install --cwd web-ui --frozen-lockfile || bun install --cwd web-ui

      - name: Install packages/desktop dependencies
        run: bun install --cwd packages/desktop || npm ci --prefix packages/desktop

      - name: Build
        run: bun run build

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Root tests
        run: bun run test

      - name: Web UI tests
        run: bun --cwd web-ui run test

      - name: packages/desktop typecheck
        run: npm --prefix packages/desktop run typecheck

      - name: packages/desktop tests
        run: npm --prefix packages/desktop test
