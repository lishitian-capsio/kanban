name: Test

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-check-test:
    timeout-minutes: 10
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            bun-version: "1.3.14"
          - os: macos-latest
            bun-version: "1.3.14"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ matrix.bun-version }}

      - name: Setup Node.js (for node-gyp / Electron)
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            web-ui/node_modules
            packages/desktop/node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('**/package-lock.json', '**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-

      # macOS node-gyp/electron rebuilds can fail with Python 3.12/distutils; pin 3.11.
      - name: Setup Python (for node-gyp on macOS)
        if: matrix.os == 'macos-latest'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          echo "Installing root dependencies..."
          npm ci || npm install
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Install web-ui dependencies
        run: |
          echo "Installing web-ui dependencies..."
          cd web-ui && (npm ci || npm install)
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Install packages/desktop dependencies
        run: npm ci --prefix packages/desktop

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Root tests
        run: npm run test

      - name: Web UI tests
        run: cd web-ui && npm run test

      - name: packages/desktop typecheck
        run: npm --prefix packages/desktop run typecheck

      - name: packages/desktop tests
        run: npm --prefix packages/desktop test
