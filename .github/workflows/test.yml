name: Test

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-check-test:
    timeout-minutes: 10
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
          - os: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Cache node_modules
        uses: actions/cache@v5
        with:
          path: |
            node_modules
            web-ui/node_modules
            packages/desktop/node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-

      # macOS node-gyp/electron rebuilds can fail with Python 3.12/distutils; pin 3.11.
      - name: Setup Python (for node-gyp on macOS)
        if: matrix.os == 'macos-latest'
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: npm ci || npm install

      - name: Install web-ui dependencies
        run: |
          cd web-ui && (npm ci || npm install)

      - name: Install packages/desktop dependencies
        run: |
          cd packages/desktop && (npm ci || npm install)

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint || true
        continue-on-error: true

      - name: Typecheck
        run: npm run typecheck || true
        continue-on-error: true

      - name: Root tests
        run: npm run test

      - name: Web UI tests
        run: |
          cd web-ui && npm run test

      - name: packages/desktop typecheck
        run: npm --prefix packages/desktop run typecheck

      - name: packages/desktop tests
        run: npm --prefix packages/desktop test
