name: Test

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-check-test:
    timeout-minutes: 10
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
          - os: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Cache node_modules
        uses: actions/cache@v5
        with:
          path: |
            node_modules
            web-ui/node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-

      - name: Install dependencies
        run: npm ci || npm install

      - name: Install web-ui dependencies
        run: |
          cd web-ui && (npm ci || npm install)

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint || true
        continue-on-error: true

      - name: Typecheck
        run: npm run typecheck || true
        continue-on-error: true

      - name: Root tests
        run: npx vitest run

      - name: Web UI tests
        run: |
          cd web-ui && npm run test
