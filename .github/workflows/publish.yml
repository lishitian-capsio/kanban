name: Publish

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to publish (example: v1.2.3)"
        required: true
        type: string

concurrency:
  group: publish-${{ github.workflow }}-${{ inputs.tag }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

jobs:
  test:
    uses: ./.github/workflows/test.yml

  publish:
    name: Publish npm package and create GitHub release
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Resolve tag
        id: resolve_tag
        env:
          TAG: ${{ inputs.tag }}
        run: |
          if [ -z "$TAG" ]; then
            echo "Error: tag input is required"
            exit 1
          fi
          git fetch origin --tags
          if ! git show-ref --verify --quiet "refs/tags/$TAG"; then
            echo "Error: tag '$TAG' does not exist"
            exit 1
          fi
          git checkout --detach "refs/tags/$TAG^{commit}"

          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.]+)?$ ]]; then
            echo "Error: tag must match vX.Y.Z (with optional prerelease suffix)"
            exit 1
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Setup Node.js (for npm publish / node-gyp)
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          registry-url: "https://registry.npmjs.org"

      - name: Cache Bun install cache
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-cache-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-cache-

      - name: Install dependencies
        run: |
          echo "Installing dependencies with retry..."
          for i in 1 2 3; do
            if BUN_INSTALL_REGISTRY=https://registry.npmjs.org bun install --frozen-lockfile; then
              echo "Success on attempt $i"
              exit 0
            fi
            echo "Attempt $i failed, waiting 5s..."
            sleep 5
          done
          echo "Falling back to non-frozen install..."
          bun install

      - name: Install web-ui dependencies
        run: bun install --cwd web-ui --frozen-lockfile || bun install --cwd web-ui

      - name: Verify tag matches package version
        id: version
        run: |
          TAG="${{ steps.resolve_tag.outputs.tag }}"
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          EXPECTED_TAG="v${PACKAGE_VERSION}"

          if [ "$TAG" != "$EXPECTED_TAG" ]; then
            echo "Error: tag '$TAG' does not match package version '$EXPECTED_TAG'"
            exit 1
          fi

          echo "package_version=$PACKAGE_VERSION" >> "$GITHUB_OUTPUT"

      - name: Build and validate package
        run: bun run prepublishOnly
        env:
          POSTHOG_KEY: ${{ secrets.POSTHOG_KEY }}
          POSTHOG_HOST: ${{ secrets.POSTHOG_HOST }}
          OTEL_TELEMETRY_ENABLED: ${{ secrets.OTEL_TELEMETRY_ENABLED }}
          OTEL_LOGS_EXPORTER: otlp
          OTEL_METRICS_EXPORTER: otlp
          OTEL_EXPORTER_OTLP_PROTOCOL: ${{ secrets.OTEL_EXPORTER_OTLP_PROTOCOL }}
          OTEL_EXPORTER_OTLP_ENDPOINT: ${{ secrets.OTEL_EXPORTER_OTLP_ENDPOINT }}
          OTEL_EXPORTER_OTLP_HEADERS: ${{ secrets.OTEL_EXPORTER_OTLP_HEADERS }}

      # npm publish re-triggers prepublishOnly as a lifecycle hook, which
      # rebuilds the web-ui from scratch. Without these env vars, the
      # rebuild produces a bundle with no PostHog key baked in.
      - name: Publish to npm (OIDC trusted publishing)
        run: npm publish --access public
        env:
          POSTHOG_KEY: ${{ secrets.POSTHOG_KEY }}
          POSTHOG_HOST: ${{ secrets.POSTHOG_HOST }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          OTEL_TELEMETRY_ENABLED: ${{ secrets.OTEL_TELEMETRY_ENABLED }}
          OTEL_LOGS_EXPORTER: otlp
          OTEL_METRICS_EXPORTER: otlp
          OTEL_EXPORTER_OTLP_PROTOCOL: ${{ secrets.OTEL_EXPORTER_OTLP_PROTOCOL }}
          OTEL_EXPORTER_OTLP_ENDPOINT: ${{ secrets.OTEL_EXPORTER_OTLP_ENDPOINT }}
          OTEL_EXPORTER_OTLP_HEADERS: ${{ secrets.OTEL_EXPORTER_OTLP_HEADERS }}

      - name: Extract changelog entry for release
        id: changelog
        run: |
          node .github/scripts/extract-changelog-entry.mjs \
            --version "${{ steps.version.outputs.package_version }}" \
            --changelog CHANGELOG.md \
            --output-key body

      - name: Compute compare link
        id: compare
        run: |
          TAG="${{ steps.resolve_tag.outputs.tag }}"
          PREV_TAG=$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || true)

          if [ -n "$PREV_TAG" ]; then
            echo "link=Full Changelog: https://github.com/${GITHUB_REPOSITORY}/compare/${PREV_TAG}...${TAG}" >> "$GITHUB_OUTPUT"
          else
            echo "link=" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.resolve_tag.outputs.tag }}
          name: ${{ steps.resolve_tag.outputs.tag }}
          body: |
            ${{ steps.changelog.outputs.body }}

            ${{ steps.compare.outputs.link }}
          prerelease: ${{ contains(steps.resolve_tag.outputs.tag, '-') }}

      - name: Post release to Slack
        uses: slackapi/slack-github-action@v3.0.1
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_RELEASE_BOT_TOKEN }}
          payload: |
            channel: "C0APVKGGZFC"
            text: "Kanban ${{ steps.resolve_tag.outputs.tag }}"
            blocks:
              - type: "section"
                text:
                  type: "mrkdwn"
                  text: "*Kanban ${{ steps.resolve_tag.outputs.tag }}*"
              - type: "section"
                text:
                  type: "mrkdwn"
                  text: ${{ toJSON(steps.changelog.outputs.body) }}
              - type: "context"
                elements:
                  - type: "mrkdwn"
                    text: "${{ steps.compare.outputs.link }}"
